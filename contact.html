<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myntro — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#162033', dark: '#0f1729' },
            beige: { panel: '#ebe6de', section: '#f0ebe3' },
            teal: { btn: '#8ecbce', btnHover: '#7ab8bc' },
          },
          fontFamily: { headline: ['"Playfair Display"', 'Georgia', 'serif'], sans: ['"Source Sans Pro"', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
</head>
<body class="bg-[#f5f2ed] font-sans text-slate-700 antialiased">
  <header class="sticky top-0 z-50 bg-[#051C2C] font-sans text-white">
    <nav class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-3 md:flex-nowrap md:gap-6 md:px-8 md:py-3.5">
      <a href="index.html" class="flex min-w-0 shrink-0 items-center">
        <img src="assets/myntro-logo.png" alt="myntro" width="160" height="40" class="h-8 w-auto max-w-[min(200px,45vw)] object-contain object-left md:h-9" />
      </a>
      <div class="order-3 flex w-full flex-[1_1_100%] flex-wrap items-center justify-center gap-x-6 gap-y-2 sm:gap-x-10 md:order-none md:min-w-0 md:flex-1 md:justify-center md:gap-x-12">
        <a href="overnight.html" class="nav-link nav-link--plain">Overnight money</a>
        <a href="fixed-term.html" class="nav-link nav-link--plain">Fixed-term deposits</a>
        <a href="about.html" class="nav-link nav-link--plain">About us</a>
      </div>
      <div class="flex shrink-0 items-center gap-2 md:gap-3">
        <a href="contact.html" class="pill whitespace-nowrap border border-white bg-white/10 px-5 py-2 text-sm font-semibold text-white">Contact us</a>
        <button type="button" class="pill flex items-center gap-2 border border-white bg-transparent px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/10">
          <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Log in
        </button>
      </div>
    </nav>
  </header>

  <main class="px-4 py-14 md:py-20">
    <div class="mx-auto max-w-xl">
      <h1 class="font-headline text-3xl text-navy md:text-4xl">Contact us</h1>
      <p class="mt-3 font-sans text-slate-600">Send a message—we typically reply within one business day.</p>
      <form class="mt-10 space-y-5" action="#" method="post" onsubmit="event.preventDefault(); alert('Prototype: form not sent.');">
        <div>
          <label for="name" class="block text-sm font-semibold text-navy">Name</label>
          <input id="name" name="name" type="text" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-navy outline-none focus:ring-2 focus:ring-navy/20" placeholder="Your name" />
        </div>
        <div>
          <label for="email" class="block text-sm font-semibold text-navy">Email</label>
          <input id="email" name="email" type="email" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-navy outline-none focus:ring-2 focus:ring-navy/20" placeholder="you@example.com" />
        </div>
        <div>
          <label for="msg" class="block text-sm font-semibold text-navy">Message</label>
          <textarea id="msg" name="message" rows="5" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-navy outline-none focus:ring-2 focus:ring-navy/20" placeholder="How can we help?"></textarea>
        </div>
        <button type="submit" class="pill w-full bg-navy py-3.5 text-sm font-semibold text-white transition hover:opacity-90 sm:w-auto sm:px-10">Send message</button>
      </form>
      <p class="mt-10 font-sans text-sm text-slate-500">
        <strong class="text-navy">Address:</strong> Birger Jarlsgatan 18, 114 34 Stockholm, Sweden
      </p>
    </div>
  </main>

  <footer class="bg-navy-dark px-4 py-14 text-slate-400">
    <div class="mx-auto max-w-6xl text-center text-xs">
      <a href="index.html" class="hover:text-white">← Back to home</a>
      <p class="mt-4">© 2026 Myntro AB.</p>
    </div>
  </footer>
</body>
</html>
